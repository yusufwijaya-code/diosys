<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <defs>
        <linearGradient id="softMetallic" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#A5B4FC" />
            <stop offset="50%" stop-color="#E2E8F0" />
            <stop offset="100%" stop-color="#CBD5E1" />
        </linearGradient>
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
        </filter>
    </defs>

    <style>
        .bg-soft { fill: #0F1115; rx: 40px; }
        .icon-d { fill: none; stroke: #E2E8F0; stroke-width: 10; stroke-linecap: round; stroke-linejoin: round; opacity: 0.95; }
        .code-brackets { fill: none; stroke: url(#softMetallic); stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
        .slash-line { fill: none; stroke: #64748B; stroke-width: 5; stroke-linecap: round; }
        .text-brand { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; font-size: 64px; fill: #F8FAFC; letter-spacing: -1.5px; }
        .subtext { font-family: 'Inter', system-ui, sans-serif; font-weight: 400; font-size: 16px; fill: #64748B; letter-spacing: 6px; }
    </style>

    <rect width="800" height="500" class="bg-soft" />

    <g transform="translate(400, 195)" filter="url(#softShadow)">
        <path d="M -40,-60 L 5,-60 C 40,-60 65,-35 65,0 C 65,35 40,60 5,60 L -40,60 Z" class="icon-d" />
        <path d="M -40,-35 L -60,0 L -40,35" class="code-brackets" />
        <path d="M 15,-25 L 30,0 L 15,25" class="code-brackets" opacity="0.8" />
        <line x1="10" y1="-40" x2="-15" y2="40" class="slash-line" />
    </g>

    <text x="400" y="415" text-anchor="middle" class="text-brand">Diosys</text>
    <text x="403" y="445" text-anchor="middle" class="subtext">TECHNOLOGY</text>
</svg>
